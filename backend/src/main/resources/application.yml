server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: inject-erp

  # 数据源配置（PostgreSQL / Supabase）
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inject_erp}?sslmode=${DB_SSLMODE:disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.injectmes.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:inject-erp-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: "Bearer "

# 文件存储配置
file:
  upload-path: ./uploads/
  access-path: /uploads/**

# 日志配置
logging:
  level:
    root: INFO
    com.injectmes: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
