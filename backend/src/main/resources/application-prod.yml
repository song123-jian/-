spring:
  # 生产环境数据源（PostgreSQL / Supabase）
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:inject_erp}?sslmode=${DB_SSLMODE:require}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
# MyBatis-Plus生产环境关闭SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT生产环境密钥
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# 文件存储路径
file:
  upload-path: /data/inject-erp/uploads/

# 日志级别
logging:
  level:
    root: WARN
    com.injectmes: INFO
